<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quiz: Организация и управление маркетингом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Poppins', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Quizizz стиль: тёмный фон, яркие карточки */
        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
        }

        /* Header */
        .quiz-header {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.7rem;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .progress-badge {
            background: #2e3b46;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Карточка вопроса */
        .question-card {
            background: rgba(255,255,255,0.95);
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e2a36;
            margin-bottom: 1.5rem;
            line-height: 1.3;
            border-left: 5px solid #FFB347;
            padding-left: 1rem;
        }

        /* варианты ответов */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            background: #f2f5f9;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s;
            border: 1.5px solid transparent;
        }

        .option:hover {
            background: #e9edf3;
            transform: translateX(5px);
        }

        input[type="checkbox"], input[type="radio"] {
            width: 1.3rem;
            height: 1.3rem;
            cursor: pointer;
            accent-color: #FFB347;
        }

        .option label {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: #1f2e3a;
            cursor: pointer;
            line-height: 1.4;
        }

        /* подсказка про множественный выбор */
        .multi-hint {
            font-size: 0.75rem;
            color: #d97706;
            background: #fff1e0;
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        /* кнопки */
        .action-buttons {
            margin-top: 1.2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn-check {
            background: #FFB347;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            color: #1f2e3a;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .btn-check:hover {
            background: #ff9f1c;
            transform: scale(0.97);
        }

        .feedback {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            background: #f0f0f0;
            display: none;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border-left: 6px solid #28a745;
            display: block;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border-left: 6px solid #dc3545;
            display: block;
        }

        /* Панель финальная */
        .submit-area {
            margin-top: 2rem;
            text-align: center;
        }

        .btn-submit {
            background: #2d6a4f;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 3rem;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            transition: all 0.2s;
            box-shadow: 0 8px 14px rgba(0,0,0,0.2);
        }

        .btn-submit:hover {
            background: #1f543e;
            transform: scale(0.98);
        }

        .result-card {
            background: #0f212e;
            color: white;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 2rem;
            text-align: center;
            display: none;
        }

        .score-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: #FFB347;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #9aaebf;
            font-size: 0.75rem;
        }

        @media (max-width: 650px) {
            .question-card {
                padding: 1rem 1.2rem;
            }
            .question-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-header">
        <h1>📊 Маркетинг: организация & управление</h1>
        <div class="progress-badge" id="questionCounter">Вопрос 1 из <span id="totalQuestionsSpan">0</span></div>
    </div>

    <div id="questionsContainer"></div>

    <div class="submit-area">
        <button class="btn-submit" id="finalSubmitBtn">✨ Завершить тест ✨</button>
    </div>
    <div id="finalResult" class="result-card"></div>
    <footer>🎯 Выберите вариант(ы). В вопросах с несколькими правильными ответами нужно отметить все верные.</footer>
</div>

<script>
    // ---------- БАНК ВОПРОСОВ с правильными ответами и неправильными (дистракторами) ----------
    // В точности формулировки из вашего файла, но с вариантами ответа.
    // Для каждого вопроса тип: single (radio) или multi (checkbox). Если правильных ответов несколько → multi.
    // Правильные ответы заданы массивом correctValues (тексты совпадают с вариантами).
    
    const QUESTIONS = [
        { text: "Потребность – это…", type: "single", options: ["Чувство нехватки чего-либо, нужда, принявшая форму в соответствии с культурой и личностью", "Осознанная нужда, подкреплённая покупательной способностью", "Товар, который можно купить", "Желание обладать престижной вещью"], correctValues: ["Чувство нехватки чего-либо, нужда, принявшая форму в соответствии с культурой и личностью"] },
        { text: "Общественным классам присущи несколько характеристик", type: "multi", options: ["Лица, входящие в один класс, склонны вести себя одинаково", "Общественные классы имеют иерархию", "Они основаны только на уровне дохода", "Они имеют определённые границы", "Основаны на роде занятий, доходах, образовании, ценностях"], correctValues: ["Лица, входящие в один класс, склонны вести себя одинаково", "Общественные классы имеют иерархию", "Они имеют определённые границы", "Основаны на роде занятий, доходах, образовании, ценностях"] },
        { text: "В маркетинге товар понимается как…..", type: "multi", options: ["Только физический продукт", "Всё, что может удовлетворить потребность или нужду и предлагается рынку", "Услуги, лица, места, организации, идеи", "Только оборудование и техника"], correctValues: ["Всё, что может удовлетворить потребность или нужду и предлагается рынку", "Услуги, лица, места, организации, идеи"] },
        { text: "Психологи разработали ряд теорий человеческой мотивации, самые популярные из них:", type: "multi", options: ["Теория Фрейда (психоаналитическая)", "Теория иерархии потребностей Маслоу", "Двухфакторная теория Герцберга", "Теория Хоторна"], correctValues: ["Теория Фрейда (психоаналитическая)", "Теория иерархии потребностей Маслоу", "Двухфакторная теория Герцберга"] },
        { text: "На покупательском выборе индивида сказываются также основные факторы психологического порядка, такие как:", type: "multi", options: ["Мотивация", "Восприятие", "Усвоение (научение)", "Убеждения и отношения (установки)", "Цвет упаковки"], correctValues: ["Мотивация", "Восприятие", "Усвоение (научение)", "Убеждения и отношения (установки)"] },
        { text: "Поведение потребителя определяется также и факторами социального порядка, такими как", type: "multi", options: ["Референтные группы", "Семья", "Социальные роли и статусы", "Климатические условия"], correctValues: ["Референтные группы", "Семья", "Социальные роли и статусы"] },
        { text: "Существует три основных вида ситуаций совершения закупок, перечислите их", type: "multi", options: ["Обычная перепродажа (повторная закупка без изменений)", "Решение задач (повторная закупка с изменениями)", "Новые закупки", "Тендерные торги"], correctValues: ["Обычная перепродажа (повторная закупка без изменений)", "Решение задач (повторная закупка с изменениями)", "Новые закупки"] },
        { text: "«Чёрный ящик» состоит из двух важнейших частей, перечислите", type: "multi", options: ["Характеристики покупателя (культурные, социальные, личные, психологические)", "Процесс принятия покупательского решения", "Бюджет потребителя", "Стимулы маркетинга-микс"], correctValues: ["Характеристики покупателя (культурные, социальные, личные, психологические)", "Процесс принятия покупательского решения"] },
        { text: "Маркетинговая информация может быть классифицирована следующим образом:", type: "multi", options: ["По источникам (первичная, вторичная)", "По характеру (количественная, качественная)", "По отношению к предприятию (внутренняя, внешняя)", "Только по цене сбора"], correctValues: ["По источникам (первичная, вторичная)", "По характеру (количественная, качественная)", "По отношению к предприятию (внутренняя, внешняя)"] },
        { text: "Основные стратегии управления качеством:", type: "multi", options: ["Стратегия постоянного улучшения (Kaizen)", "Стратегия «ноль дефектов»", "Всеобщее управление качеством (TQM)", "Бенчмаркинг качества", "Снижение затрат любой ценой"], correctValues: ["Стратегия постоянного улучшения (Kaizen)", "Стратегия «ноль дефектов»", "Всеобщее управление качеством (TQM)", "Бенчмаркинг качества"] },
        { text: "При разработке товарной политики следует выделять следующие основные элементы:", type: "multi", options: ["Ассортиментная политика", "Управление ЖЦТ", "Брендинг (марочная политика)", "Упаковка и маркировка", "Сервисная политика"], correctValues: ["Ассортиментная политика", "Управление ЖЦТ", "Брендинг (марочная политика)", "Упаковка и маркировка", "Сервисная политика"] },
        { text: "Теодор Левит впервые опубликовал концепцию жизненного цикла товара (ЖЦТ) в каком году и в каком веке?", type: "single", options: ["В 1965 году (XX век)", "В 1950 году (XX век)", "В 1980 году (XX век)", "В 2000 году (XXI век)"], correctValues: ["В 1965 году (XX век)"] },
        { text: "Цель казуального исследования заключается в:", type: "single", options: ["Выявлении причинно-следственных связей", "Описании рынка", "Сборе вторичной информации", "Генерации идей"], correctValues: ["Выявлении причинно-следственных связей"] },
        { text: "Основной недостаток экспериментов заключается в:", type: "multi", options: ["Высокая стоимость", "Сложность контроля внешних факторов", "Искусственность условий (низкая внешняя валидность)", "Этические ограничения", "Быстрота проведения"], correctValues: ["Высокая стоимость", "Сложность контроля внешних факторов", "Искусственность условий (низкая внешняя валидность)", "Этические ограничения"] },
        { text: "Отличие качественных исследований от количественных состоит в том, что они направлены на:", type: "multi", options: ["Понимание мотивов и глубинных причин поведения", "Выявление скрытых смыслов", "Получение статистически значимых числовых данных", "Опрос больших выборок"], correctValues: ["Понимание мотивов и глубинных причин поведения", "Выявление скрытых смыслов"] },
        { text: "Методы сбора первичной информации выделяют", type: "multi", options: ["Наблюдение", "Опрос", "Эксперимент", "Панельные исследования", "Имитационное моделирование"], correctValues: ["Наблюдение", "Опрос", "Эксперимент", "Панельные исследования", "Имитационное моделирование"] },
        { text: "Основные концепции управления маркетингом:", type: "multi", options: ["Совершенствования производства", "Совершенствования товара", "Интенсификации коммерческих усилий", "Чистого маркетинга (потребительская)", "Социально-этичного маркетинга", "Маркетинга взаимодействия"], correctValues: ["Совершенствования производства", "Совершенствования товара", "Интенсификации коммерческих усилий", "Чистого маркетинга (потребительская)", "Социально-этичного маркетинга", "Маркетинга взаимодействия"] },
        { text: "Определение маркетинга Питера Друкера", type: "single", options: ["Цель маркетинга — сделать усилия по сбыту ненужными", "Маркетинг — это искусство продавать", "Маркетинг — реклама и сбыт", "Удовлетворение потребностей с прибылью"], correctValues: ["Цель маркетинга — сделать усилия по сбыту ненужными"] },
        { text: "Концепция социально-этического маркетинга требует сбалансированности трех факторов", type: "multi", options: ["Интересы компании (прибыль)", "Потребности потребителей (удовлетворение)", "Долгосрочные интересы общества", "Минимизация налогов"], correctValues: ["Интересы компании (прибыль)", "Потребности потребителей (удовлетворение)", "Долгосрочные интересы общества"] },
        { text: "Побудительные факторы маркетинга:", type: "multi", options: ["Товар", "Цена", "Место (распределение)", "Продвижение", "Прибыль"], correctValues: ["Товар", "Цена", "Место (распределение)", "Продвижение"] },
        { text: "Продвижение — это", type: "multi", options: ["Совокупность действий по информированию, убеждению, напоминанию", "Реклама, PR", "Стимулирование сбыта, личные продажи", "Прямой маркетинг", "Только наружная реклама"], correctValues: ["Совокупность действий по информированию, убеждению, напоминанию", "Реклама, PR", "Стимулирование сбыта, личные продажи", "Прямой маркетинг"] },
        { text: "Комплекс маркетинга-микс включает в себя...", type: "multi", options: ["Product (товар)", "Price (цена)", "Place (место/распределение)", "Promotion (продвижение)", "People (люди)", "Profit (прибыль)"], correctValues: ["Product (товар)", "Price (цена)", "Place (место/распределение)", "Promotion (продвижение)"] },
        { text: "В маркетинговых исследованиях при выборе сегмента существенными критериями являются", type: "multi", options: ["Измеримость", "Доступность", "Ёмкость", "Защищённость от конкуренции", "Соответствие ресурсам", "Цвет логотипа"], correctValues: ["Измеримость", "Доступность", "Ёмкость", "Защищённость от конкуренции", "Соответствие ресурсам"] },
        { text: "В теории маркетинга к числу пяти основных конкурирующих сил (по М. Портеру) относят следующие", type: "multi", options: ["Угроза новых игроков", "Угроза товаров-заменителей", "Рыночная власть поставщиков", "Рыночная власть покупателей", "Конкуренция между игроками", "Государственное регулирование"], correctValues: ["Угроза новых игроков", "Угроза товаров-заменителей", "Рыночная власть поставщиков", "Рыночная власть покупателей", "Конкуренция между игроками"] },
        { text: "К основным средствам продвижения товара относятся:", type: "multi", options: ["Реклама", "Стимулирование сбыта", "PR", "Личные продажи", "Прямой маркетинг", "Бухгалтерский учёт"], correctValues: ["Реклама", "Стимулирование сбыта", "PR", "Личные продажи", "Прямой маркетинг"] },
        { text: "Маркетинговые решения на этапе «зрелости» ЖЦТ включают", type: "multi", options: ["Модификация рынка", "Модификация товара", "Модификация комплекса маркетинга", "Защита доли рынка", "Поиск ниш", "Снятие с производства"], correctValues: ["Модификация рынка", "Модификация товара", "Модификация комплекса маркетинга", "Защита доли рынка", "Поиск ниш"] }
    ];

    // Дополним общим количеством
    const TOTAL_QS = QUESTIONS.length;
    document.getElementById('totalQuestionsSpan').innerText = TOTAL_QS;

    // Состояние ответов пользователя: для каждого вопроса массив выбранных значений (строки)
    let userSelections = Array(TOTAL_QS).fill().map(() => []);

    // Отрисовка всех карточек
    const container = document.getElementById('questionsContainer');
    
    function renderQuestions() {
        container.innerHTML = '';
        QUESTIONS.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            const qNumber = idx + 1;
            const multiHint = (q.type === 'multi') ? '<div class="multi-hint">✔️ Возможно несколько правильных ответов</div>' : '';
            let optionsHtml = '';
            
            q.options.forEach(opt => {
                const isChecked = userSelections[idx].includes(opt);
                if (q.type === 'single') {
                    optionsHtml += `
                        <div class="option" data-qidx="${idx}" data-val="${opt.replace(/"/g, '&quot;')}">
                            <input type="radio" name="q${idx}" value="${opt.replace(/"/g, '&quot;')}" ${isChecked ? 'checked' : ''}>
                            <label>${opt}</label>
                        </div>
                    `;
                } else { // multi
                    optionsHtml += `
                        <div class="option" data-qidx="${idx}" data-val="${opt.replace(/"/g, '&quot;')}">
                            <input type="checkbox" name="q${idx}" value="${opt.replace(/"/g, '&quot;')}" ${isChecked ? 'checked' : ''}>
                            <label>${opt}</label>
                        </div>
                    `;
                }
            });
            
            const feedbackId = `fb-${idx}`;
            card.innerHTML = `
                <div class="question-text">${qNumber}. ${q.text}</div>
                ${multiHint}
                <div class="options-list" id="options-list-${idx}">
                    ${optionsHtml}
                </div>
                <div class="action-buttons">
                    <button class="btn-check" data-idx="${idx}">🔍 Проверить ответ</button>
                </div>
                <div id="${feedbackId}" class="feedback"></div>
            `;
            container.appendChild(card);
        });
        
        // Привязываем события к radio/checkbox (сохранять выбранные)
        for (let i = 0; i < TOTAL_QS; i++) {
            const qtype = QUESTIONS[i].type;
            const containerDiv = document.querySelector(`#options-list-${i}`);
            if (!containerDiv) continue;
            const inputs = containerDiv.querySelectorAll('input');
            inputs.forEach(inp => {
                inp.addEventListener('change', (e) => {
                    const val = inp.value;
                    const current = userSelections[i];
                    if (qtype === 'single') {
                        if (inp.checked) {
                            userSelections[i] = [val];
                        } else {
                            userSelections[i] = [];
                        }
                    } else {
                        if (inp.checked) {
                            if (!current.includes(val)) userSelections[i].push(val);
                        } else {
                            const index = current.indexOf(val);
                            if (index !== -1) userSelections[i].splice(index, 1);
                        }
                    }
                    // сохранить массив (без дублей)
                    if (qtype === 'multi') userSelections[i] = [...new Set(userSelections[i])];
                });
            });
        }
        
        // Кнопки "Проверить ответ"
        document.querySelectorAll('.btn-check').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                checkSingleQuestion(idx);
            });
        });
    }
    
    function checkSingleQuestion(qIdx) {
        const question = QUESTIONS[qIdx];
        const selected = userSelections[qIdx];
        const correctValues = question.correctValues;
        let isCorrect = false;
        if (question.type === 'single') {
            isCorrect = (selected.length === 1 && correctValues.includes(selected[0]));
        } else {
            // multi: все правильные отмечены и нет лишних
            const selectedSet = new Set(selected);
            const correctSet = new Set(correctValues);
            let allCorrectSelected = true;
            for (let cv of correctSet) {
                if (!selectedSet.has(cv)) { allCorrectSelected = false; break; }
            }
            let noExtra = true;
            for (let sel of selectedSet) {
                if (!correctSet.has(sel)) { noExtra = false; break; }
            }
            isCorrect = (allCorrectSelected && noExtra);
        }
        
        const fbDiv = document.getElementById(`fb-${qIdx}`);
        if (isCorrect) {
            fbDiv.innerHTML = '✅ Верно! Отличные знания.';
            fbDiv.className = 'feedback correct';
        } else {
            const correctAnswersStr = correctValues.join('; ');
            fbDiv.innerHTML = `❌ Неправильно. Правильный ответ: ${correctAnswersStr}.`;
            fbDiv.className = 'feedback incorrect';
        }
        // Прокрутка к фидбеку
        fbDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    // Финальная проверка всего теста
    function finalCheck() {
        let totalCorrect = 0;
        const resultsPerQuestion = [];
        for (let i = 0; i < TOTAL_QS; i++) {
            const q = QUESTIONS[i];
            const selected = userSelections[i];
            const correctValues = q.correctValues;
            let isCorrect = false;
            if (q.type === 'single') {
                isCorrect = (selected.length === 1 && correctValues.includes(selected[0]));
            } else {
                const selectedSet = new Set(selected);
                const correctSet = new Set(correctValues);
                let allCorrect = true;
                for (let cv of correctSet) if (!selectedSet.has(cv)) { allCorrect = false; break; }
                let noExtra = true;
                for (let sel of selectedSet) if (!correctSet.has(sel)) { noExtra = false; break; }
                isCorrect = (allCorrect && noExtra);
            }
            if (isCorrect) totalCorrect++;
            resultsPerQuestion.push({ index: i, correct: isCorrect, correctAnswers: correctValues });
        }
        
        const percent = Math.round((totalCorrect / TOTAL_QS) * 100);
        const resultDiv = document.getElementById('finalResult');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <div class="score-text">🎯 ${totalCorrect} / ${TOTAL_QS} (${percent}%)</div>
            <p style="margin-top: 0.5rem;">${percent >= 70 ? '🏆 Поздравляем! Отличный результат!' : '📚 Изучите материал и попробуйте снова.'}</p>
            <button id="showMistakesBtn" style="background:#FFB347; border:none; padding:0.5rem 1.5rem; border-radius:2rem; font-weight:bold; margin-top:1rem; cursor:pointer;">Показать ошибки</button>
        `;
        const showBtn = document.getElementById('showMistakesBtn');
        if (showBtn) {
            showBtn.addEventListener('click', () => {
                // Проходим по вопросам, где ошибка, показываем подсказки (открываем фидбек)
                for (let i = 0; i < TOTAL_QS; i++) {
                    const fbDiv = document.getElementById(`fb-${i}`);
                    if (!fbDiv) continue;
                    if (!resultsPerQuestion[i].correct) {
                        const correctStr = resultsPerQuestion[i].correctAnswers.join('; ');
                        fbDiv.innerHTML = `❌ Ошибка. Правильный ответ: ${correctStr}.`;
                        fbDiv.className = 'feedback incorrect';
                        fbDiv.style.display = 'block';
                    } else {
                        if (fbDiv.classList.contains('incorrect')) {
                            fbDiv.innerHTML = '✅ Верно!';
                            fbDiv.className = 'feedback correct';
                        }
                    }
                }
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            });
        }
    }
    
    // Инициализация и обработка финальной кнопки
    renderQuestions();
    const finalBtn = document.getElementById('finalSubmitBtn');
    finalBtn.addEventListener('click', finalCheck);
    
    // Обновление счетчика вопросов (дополнительно)
    function updateCounter() {
        // просто визуально, но не обязательно динамическое
    }
    updateCounter();
</script>
