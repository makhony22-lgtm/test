        { text: "Электронное тестирование рынка обеспечивает:", type: "multi", options: ["Быстрое получение данных", "Сканирование штрих-кодов", "Эксперименты в магазинах", "Оценку реакции на цену"], correctValues: ["Быстрое получение данных", "Сканирование штрих-кодов", "Эксперименты в магазинах", "Оценку реакции на цену"] },
        { text: "Цели разведочного исследования:", type: "multi", options: ["Прояснение проблемы", "Выдвижение гипотез", "Установление приоритетов", "Ознакомление с терминологией"], correctValues: ["Прояснение проблемы", "Выдвижение гипотез", "Установление приоритетов", "Ознакомление с терминологией"] },
        { text: "При установлении надежности следует иметь в виду, что в процессе измерения участвуют три составляющие:", type: "multi", options: ["Исследователь/наблюдатель", "Инструмент измерения", "Объект измерения", "Среда измерения"], correctValues: ["Исследователь/наблюдатель", "Инструмент измерения", "Объект измерения"] }
    ];

    // Состояние ответов пользователя
    let userSelections = Array(QUESTIONS.length).fill().map(() => []);

    // Загрузка сохранённых ответов
    const saved = localStorage.getItem('quiz_part3_answers');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length === QUESTIONS.length) {
                userSelections = parsed;
            }
        } catch(e) {}
    }

    const container = document.getElementById('questionsContainer');
    
    function renderQuestions() {
        container.innerHTML = '';
        QUESTIONS.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            const qNumber = idx + 131;
            const multiHint = (q.type === 'multi') ? '<div class="multi-hint">✔️ Возможно несколько правильных ответов</div>' : '';
            let optionsHtml = '';
            
            q.options.forEach(opt => {
                const isChecked = userSelections[idx]?.includes(opt) || false;
                if (q.type === 'single') {
                    optionsHtml += `
                        <div class="option">
                            <input type="radio" name="q${idx}" value="${opt.replace(/"/g, '&quot;')}" ${isChecked ? 'checked' : ''}>
                            <label>${opt}</label>
                        </div>
                    `;
                } else {
                    optionsHtml += `
                        <div class="option">
                            <input type="checkbox" name="q${idx}" value="${opt.replace(/"/g, '&quot;')}" ${isChecked ? 'checked' : ''}>
                            <label>${opt}</label>
                        </div>
                    `;
                }
            });
            
            const feedbackId = `fb-${idx}`;
            card.innerHTML = `
                <div class="question-text">${qNumber}. ${q.text}</div>
                ${multiHint}
                <div class="options-list" id="options-list-${idx}">
                    ${optionsHtml}
                </div>
                <div class="action-buttons">
                    <button class="btn-check" data-idx="${idx}">🔍 Проверить ответ</button>
                </div>
                <div id="${feedbackId}" class="feedback"></div>
            `;
            container.appendChild(card);
        });
        
        // Привязываем события сохранения
        for (let i = 0; i < QUESTIONS.length; i++) {
            const containerDiv = document.querySelector(`#options-list-${i}`);
            if (!containerDiv) continue;
            const inputs = containerDiv.querySelectorAll('input');
            inputs.forEach(inp => {
                inp.addEventListener('change', (e) => {
                    const val = inp.value;
                    const current = userSelections[i];
                    if (QUESTIONS[i].type === 'single') {
                        if (inp.checked) {
                            userSelections[i] = [val];
                        } else {
                            userSelections[i] = [];
                        }
                    } else {
                        if (inp.checked) {
                            if (!current.includes(val)) userSelections[i].push(val);
                        } else {
                            const index = current.indexOf(val);
                            if (index !== -1) userSelections[i].splice(index, 1);
                        }
                    }
                    if (QUESTIONS[i].type === 'multi') userSelections[i] = [...new Set(userSelections[i])];
                    localStorage.setItem('quiz_part3_answers', JSON.stringify(userSelections));
                });
            });
        }
        
        // Кнопки проверки
        document.querySelectorAll('.btn-check').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                checkSingleQuestion(idx);
            });
        });
    }
    
    function checkSingleQuestion(qIdx) {
        const question = QUESTIONS[qIdx];
        const selected = userSelections[qIdx] || [];
        const correctValues = question.correctValues;
        let isCorrect = false;
        if (question.type === 'single') {
            isCorrect = (selected.length === 1 && correctValues.includes(selected[0]));
        } else {
            const selectedSet = new Set(selected);
            const correctSet = new Set(correctValues);
            let allCorrectSelected = true;
            for (let cv of correctSet) if (!selectedSet.has(cv)) { allCorrectSelected = false; break; }
            let noExtra = true;
            for (let sel of selectedSet) if (!correctSet.has(sel)) { noExtra = false; break; }
            isCorrect = (allCorrectSelected && noExtra);
        }
        
        const fbDiv = document.getElementById(`fb-${qIdx}`);
        if (isCorrect) {
            fbDiv.innerHTML = '✅ Верно! Отличные знания.';
            fbDiv.className = 'feedback correct';
        } else {
            const correctAnswersStr = correctValues.join('; ');
            fbDiv.innerHTML = `❌ Неправильно. Правильный ответ: ${correctAnswersStr}.`;
            fbDiv.className = 'feedback incorrect';
        }
        fbDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function finalCheck() {
        let totalCorrect = 0;
        for (let i = 0; i < QUESTIONS.length; i++) {
            const q = QUESTIONS[i];
            const selected = userSelections[i] || [];
            const correctValues = q.correctValues;
            let isCorrect = false;
            if (q.type === 'single') {
                isCorrect = (selected.length === 1 && correctValues.includes(selected[0]));
            } else {
                const selectedSet = new Set(selected);
                const correctSet = new Set(correctValues);
                let allCorrect = true;
                for (let cv of correctSet) if (!selectedSet.has(cv)) { allCorrect = false; break; }
                let noExtra = true;
                for (let sel of selectedSet) if (!correctSet.has(sel)) { noExtra = false; break; }
                isCorrect = (allCorrect && noExtra);
            }
            if (isCorrect) totalCorrect++;
        }
        const percent = Math.round((totalCorrect / QUESTIONS.length) * 100);
        const resultDiv = document.getElementById('finalResult');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <div class="score-text">🎯 ${totalCorrect} / ${QUESTIONS.length} (${percent}%)</div>
            <p style="margin-top: 0.5rem;">${percent >= 70 ? '🏆 Поздравляем! Отличный результат!' : '📚 Изучите материал и попробуйте снова.'}</p>
            <button id="showMistakesBtn" style="background:#FFB347; border:none; padding:0.5rem 1.5rem; border-radius:2rem; font-weight:bold; margin-top:1rem; cursor:pointer;">Показать ошибки</button>
        `;
        const showBtn = document.getElementById('showMistakesBtn');
        if (showBtn) {
            showBtn.addEventListener('click', () => {
                for (let i = 0; i < QUESTIONS.length; i++) {
                    const fbDiv = document.getElementById(`fb-${i}`);
                    if (!fbDiv) continue;
                    const selected = userSelections[i] || [];
                    const correctValues = QUESTIONS[i].correctValues;
                    let isCorrect = false;
                    if (QUESTIONS[i].type === 'single') {
                        isCorrect = (selected.length === 1 && correctValues.includes(selected[0]));
                    } else {
                        const selectedSet = new Set(selected);
                        const correctSet = new Set(correctValues);
                        let allCorrect = true;
                        for (let cv of correctSet) if (!selectedSet.has(cv)) { allCorrect = false; break; }
                        let noExtra = true;
                        for (let sel of selectedSet) if (!correctSet.has(sel)) { noExtra = false; break; }
                        isCorrect = (allCorrect && noExtra);
                    }
                    if (!isCorrect) {
                        fbDiv.innerHTML = `❌ Ошибка. Правильный ответ: ${correctValues.join('; ')}.`;
                        fbDiv.className = 'feedback incorrect';
                        fbDiv.style.display = 'block';
                    }
                }
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            });
        }
    }
    
    renderQuestions();
    document.getElementById('finalSubmitBtn').addEventListener('click', finalCheck);
</script>
